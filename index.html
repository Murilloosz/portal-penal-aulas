<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Concurso Tático — GPS de Aprovação</title>
    <style>
        /* [Seu CSS original aqui - omitido para foco na lógica, mas deve ser mantido] */
        :root { --primary: 80 45% 38%; --accent: 45 60% 50%; /* ... */ }
        
        .cronograma-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .dia-card {
            background: hsl(var(--card) / .8);
            border: 1px solid hsl(var(--border));
            border-radius: var(--radius);
            padding: 15px;
        }

        .dia-header {
            font-family: var(--font-heading);
            color: hsl(var(--primary));
            text-transform: uppercase;
            border-bottom: 1px solid hsl(var(--border));
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        .sessao-estudo {
            background: hsl(var(--background));
            border-left: 3px solid hsl(var(--accent));
            margin: 8px 0;
            padding: 10px;
            border-radius: 4px;
        }

        .materia-nome {
            font-weight: 700;
            font-size: 0.9rem;
            color: hsl(var(--foreground));
        }

        .topico-detalhe {
            font-size: 0.75rem;
            color: hsl(var(--muted-foreground));
            margin-top: 4px;
            display: block;
        }

        .badge-peso {
            font-size: 0.6rem;
            background: hsl(var(--primary) / 0.2);
            color: hsl(var(--primary));
            padding: 2px 5px;
            border-radius: 3px;
            margin-left: 5px;
        }
    </style>
</head>
<body>

<div id="app">
    <section class="section">
        <div class="section-header">
            <div class="section-icon primary">⚡</div>
            <div>
                <h2 class="section-title">Gerador de <span class="primary">Ciclo Tático</span></h2>
                <p class="section-subtitle">Configuração personalizada baseada em peso e recorrência de edital.</p>
            </div>
        </div>

        <div class="wizard-panel">
            <div class="grid-2">
                <div>
                    <label class="field-label">Horas Diárias</label>
                    <input type="number" id="inputHoras" value="4" class="search-bar">
                </div>
                <div>
                    <label class="field-label">Foco do Ciclo</label>
                    <select id="inputFoco" class="search-bar">
                        <option value="regular">Regular (Equilibrado)</option>
                        <option value="intensivo">Pós-Edital (Peso Máximo)</option>
                    </select>
                </div>
            </div>
            <button onclick="gerarCiclo()" class="btn btn-primary btn-iniciar" style="margin-top: 20px;">
                Gerar Roteiro de Combate
            </button>
        </div>

        <div id="resultadoCronograma" class="cronograma-grid"></div>
    </section>
</div>

<script>
/* ============================================================
   DATABASE COMPLETA (Integrada do seu arquivo original)
   ============================================================ */
const DISCIPLINAS = [
    {
        id: "penal",
        name: "Direito Penal",
        weight: 5, // Importância para PC/PM
        groups: [
            {
                name: "Parte Geral",
                items: [
                    { title: "Princípios da Legalidade e Anterioridade", weight: 3 },
                    { title: "Lei Penal no Tempo e Espaço", weight: 5 },
                    { title: "Teoria do Crime (Fato Típico)", weight: 10 }
                ]
            },
            {
                name: "Crimes Contra a Pessoa",
                items: [
                    { title: "Homicídio e Lesão Corporal", weight: 8 },
                    { title: "Crimes Contra a Honra", weight: 4 }
                ]
            }
        ]
    },
    {
        id: "const",
        name: "Direito Constitucional",
        weight: 4,
        groups: [
            {
                name: "Direitos Fundamentais",
                items: [
                    { title: "Artigo 5º (Individuais e Coletivos)", weight: 10 },
                    { title: "Nacionalidade e Direitos Políticos", weight: 6 }
                ]
            }
        ]
    },
    // Adicione aqui TODAS as outras do seu array original...
];

/* ============================================================
   MOTOR DE INTELIGÊNCIA (Lógica de Alocação Tática)
   ============================================================ */
class GpsEstudos {
    constructor(horasDiarias, foco) {
        this.horas = horasDiarias;
        this.foco = foco;
        this.diasSemana = ['Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado', 'Domingo'];
    }

    gerar() {
        const totalWeight = DISCIPLINAS.reduce((acc, d) => acc + d.weight, 0);
        let cronograma = {};

        this.diasSemana.forEach(dia => {
            cronograma[dia] = [];
            let horasRestantes = this.horas;

            // No Sábado/Domingo, foco em Revisão e Simulados (Didático)
            if (dia === 'Sábado' || dia === 'Domingo') {
                cronograma[dia].push({
                    materia: "REVISÃO TÁTICA",
                    topico: "Revisão dos erros da semana e Flashcards",
                    isSpecial: true
                });
                return;
            }

            // Distribuição baseada em peso
            DISCIPLINAS.forEach(disc => {
                const ratio = disc.weight / totalWeight;
                const horasMateria = Math.round((this.horas * ratio) * 2) / 2; // Arredonda para 0.5h

                if (horasMateria >= 1 && horasRestantes > 0) {
                    // Seleciona um tópico aleatório (ou o próximo da fila)
                    const grupo = disc.groups[Math.floor(Math.random() * disc.groups.length)];
                    const topico = grupo.items[Math.floor(Math.random() * grupo.items.length)];

                    cronograma[dia].push({
                        materia: disc.name,
                        grupo: grupo.name,
                        topico: topico.title,
                        peso: topico.weight,
                        duracao: horasMateria > horasRestantes ? horasRestantes : horasMateria
                    });
                    horasRestantes -= horasMateria;
                }
            });
        });

        return cronograma;
    }
}

function gerarCiclo() {
    const horas = document.getElementById('inputHoras').value;
    const foco = document.getElementById('inputFoco').value;
    const gps = new GpsEstudos(horas, foco);
    const dados = gps.gerar();

    const container = document.getElementById('resultadoCronograma');
    container.innerHTML = '';

    for (const [dia, sessoes] of Object.entries(dados)) {
        let htmlSessoes = sessoes.map(s => `
            <div class="sessao-estudo" ${s.isSpecial ? 'style="border-color: #ff4444"' : ''}>
                <div class="materia-nome">
                    ${s.materia} 
                    ${s.duracao ? `<span class="badge-peso">${s.duracao}h</span>` : ''}
                </div>
                <small class="topico-detalhe">
                    ${s.grupo ? `<strong>${s.grupo}:</strong> ` : ''} ${s.topico}
                </small>
            </div>
        `).join('');

        container.innerHTML += `
            <div class="dia-card">
                <div class="dia-header">
                    <span>${dia}</span>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M2 12h20"/></svg>
                </div>
                ${htmlSessoes}
            </div>
        `;
    }
}
</script>
</body>
</html>
