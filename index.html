    // PARTE ESPECIAL
    "art121": "Art. 121 CP: Homicídio simples (6-20 anos). Qualificado (§2º): 12-30 anos (torpe, cruel, feminicídio etc.). Privilegiado (§1º): diminuição 1/6 a 1/3.",

};

function toggleChat() {
    const win = document.getElementById('chatWindow');
    win.style.display = (win.style.display === 'flex') ? 'none' : 'flex';
}

function addMessage(text, isUser) {
    const body = document.getElementById('chatBody');
    const msg = document.createElement('div');
    msg.className = `message ${isUser ? 'user' : 'bot'}`;
    msg.innerHTML = text.replace(/\n/g, '<br>');
    body.appendChild(msg);
    body.scrollTop = body.scrollHeight;
}

function sendMessage() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, true);
    input.value = '';

    setTimeout(() => {
        let reply = "Consultando meu knowledge base...";

        const lower = text.toLowerCase();

        let found = false;
        for (let key in knowledgeBase) {
            if (lower.includes(key)) {
                reply = knowledgeBase[key];
                found = true;
                break;
            }
        }

        if (!found) {
            if (lower.includes("quiz") || lower.includes("pergunta") || lower.includes("teste")) {
                reply = "🎯 Quiz ativado!<br><br>Pergunta: Qual a diferença entre dolo eventual e culpa consciente? (Responda e eu corrijo)";
            } else if (lower.includes("comparar") || lower.includes("diferença")) {
                reply = "Qual tema ou artigo você quer comparar? Ex: legítima defesa × estado de necessidade, dolo eventual × culpa consciente...";
            } else {
                reply = `Sua dúvida sobre "<strong>${text}</strong>" é excelente para concursos!<br><br>Posso explicar o artigo, fazer um quiz ou comparar institutos. O que prefere?`;
            }
        }

        addMessage(reply, false);
    }, 600);
}

document.getElementById('chatInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendMessage();
});
</script>
