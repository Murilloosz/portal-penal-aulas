<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Concurso Tático — Inteligência de Concursos Policiais</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<style>
  /* [ESTILOS ORIGINAIS INTEGRADOS E AMPLIADOS] */
  :root {
    --background: 200 22% 9%;
    --foreground: 45 25% 93%;
    --card: 200 18% 13%;
    --card-foreground: 45 20% 92%;
    --primary: 80 45% 38%;
    --primary-foreground: 45 20% 97%;
    --secondary: 200 15% 19%;
    --muted: 200 15% 18%;
    --muted-foreground: 200 10% 65%;
    --accent: 35 80% 55%;
    --accent-foreground: 45 20% 97%;
    --border: 200 15% 18%;
    --input: 200 15% 18%;
    --ring: 80 45% 38%;
    --radius: 0.5rem;
    --font-heading: 'Oswald', sans-serif;
    --font-sans: 'Inter', sans-serif;
    --font-mono: 'JetBrains+Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
  body { background-color: hsl(var(--background)); color: hsl(var(--foreground)); font-family: var(--font-sans); line-height: 1.5; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
  body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: radial-gradient(hsl(var(--primary) / 0.15) 1px, transparent 1px); background-size: 24px 24px; z-index: -1; pointer-events: none; }

  /* MANTENDO TODA A SUA IDENTIDADE VISUAL */
  header { height: 64px; background: hsl(var(--card) / 0.8); backdrop-filter: blur(8px); border-bottom: 1px solid hsl(var(--border)); display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; position: sticky; top: 0; z-index: 50; }
  .logo { font-family: var(--font-heading); font-size: 1.4rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: hsl(var(--primary)); display: flex; align-items: center; gap: 8px; }
  
  /* [INTERFACE DO CRONOGRAMA DETALHADO] */
  .sessao-tatico {
    background: hsl(var(--secondary) / 0.3);
    border-left: 4px solid hsl(var(--primary));
    padding: 15px;
    margin: 10px 0;
    border-radius: 4px;
    position: relative;
    transition: all 0.2s ease;
  }
  .sessao-tatico:hover { background: hsl(var(--secondary) / 0.6); transform: translateX(5px); }
  .sessao-tatico.concluida { border-left-color: hsl(var(--muted)); opacity: 0.6; }
  .sessao-tatico.concluida .check-btn { background: hsl(var(--primary)); }

  .check-btn {
    width: 20px; height: 20px; border: 2px solid hsl(var(--primary)); border-radius: 50%;
    position: absolute; right: 15px; top: 15px; cursor: pointer;
  }
  
  .badge-instrucao {
    font-family: var(--font-mono); font-size: 0.65rem; text-transform: uppercase;
    background: hsl(var(--primary) / 0.2); color: hsl(var(--primary));
    padding: 2px 6px; border-radius: 3px; display: inline-block; margin-bottom: 5px;
  }
  
  .materia-titulo { font-family: var(--font-heading); font-size: 1.1rem; color: hsl(var(--foreground)); display: block; }
  .topico-sub { font-size: 0.85rem; color: hsl(var(--muted-foreground)); display: block; margin-top: 2px; }

  /* [ESTILOS ORIGINAIS DO WIZARD - MANTIDOS] */
  /* ... Inclua aqui todo o seu CSS do arquivo original para manter a busca e os gráficos ... */
</style>
</head>
<body>

  <header>
    <div class="logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/></svg>
      Concurso Tático
    </div>
    </header>

  <main>
    <div id="page-cronograma" class="page">
        <div id="cronograma-result"></div>
    </div>
  </main>

<script>
  /* ===========================================
     BASE DE DADOS INTEGRAL (DO SEU ARQUIVO)
     =========================================== */
  // Copiei aqui a estrutura que você já definiu para manter a consistência
  const DISCIPLINAS = [
    { id: 'const', nome: 'Dir. Constitucional', editais: 95, grupos: [
        { nome: 'Direitos Fundamentais', subs: ['Art. 5º (Individuais)', 'Direitos Sociais', 'Nacionalidade'] },
        { nome: 'Org. do Estado', subs: ['Competências da União', 'Administração Pública'] }
    ]},
    { id: 'penal', nome: 'Direito Penal', editais: 92, grupos: [
        { nome: 'Teoria do Crime', subs: ['Princípios', 'Lei Penal no Tempo/Espaço', 'Fato Típico', 'Ilicitude'] }
    ]}
    // INSIRA AQUI TODO O SEU ARRAY DE DISCIPLINAS COMPLETO
  ];

  /* ===========================================
     O "PROFESSOR" LOGÍCO (Mentoria de Conteúdo)
     =========================================== */
  class MentorDeConteudo {
    constructor(disciplinaId) {
      this.disciplina = DISCIPLINAS.find(d => d.id === disciplinaId);
      this.gIdx = 0;
      this.sIdx = 0;
    }

    getNext() {
      if (!this.disciplina) return { grupo: "Geral", sub: "Estudo de Questões" };
      let grupo = this.disciplina.grupos[this.gIdx];
      let sub = grupo.subs[this.sIdx];

      // Avança o ponteiro didático
      this.sIdx++;
      if (this.sIdx >= grupo.subs.length) {
        this.sIdx = 0;
        this.gIdx = (this.gIdx + 1) % this.disciplina.grupos.length;
      }
      return { grupo: grupo.nome, sub: sub };
    }
  }

  /* ===========================================
     GERADOR DE CRONOGRAMA TÁTICO (WIZARD)
     Melhoria: Agora ele interage com os subtópicos
     =========================================== */
  function wizardGenerate() {
    const d = state.wizardData;
    const banca = BANCAS.find(b => b.id === d.banca) || { nome: 'Personalizado' };
    
    // Inicializa mentores para as disciplinas selecionadas
    const mentores = {};
    d.materias.forEach(mId => mentores[mId] = new MentorDeConteudo(mId));

    // Lógica de Ciclo (Fila de Matérias)
    let fila = [...d.materias].sort(() => Math.random() - 0.5);
    let fIdx = 0;

    let html = `
      <div class="result-summary">
        <div class="result-stat"><div class="result-stat-label">BANCA</div><div class="result-stat-value">${banca.nome}</div></div>
        <div class="result-stat"><div class="result-stat-label">OPERAÇÃO</div><div class="result-stat-value">${d.horas}H/DIA</div></div>
      </div>
      <div style="margin: 20px 0; color: hsl(var(--muted-foreground)); font-size: 0.85rem;">
        <p><strong>Orientação:</strong> Complete as missões diárias na ordem proposta. Clique no círculo para marcar como concluído.</p>
      </div>
    `;

    const diasNomes = ['Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado', 'Domingo'];

    // Gera 2 semanas de exemplo ultra-detalhado
    for (let w = 1; w <= 2; w++) {
      html += `<h3 style="font-family:var(--font-heading); color:hsl(var(--primary)); margin: 30px 0 15px;">SEMANA ${w} — EXECUÇÃO DE EDITAL</h3>`;
      
      for (let day = 0; day < d.dias; day++) {
        html += `<div class="cronograma-day">
          <div style="font-family:var(--font-heading); padding-bottom: 8px; border-bottom: 1px solid hsl(var(--border)); margin-bottom: 15px; color: hsl(var(--primary));">
            ${diasNomes[day].toUpperCase()}
          </div>`;

        let hRestantes = d.horas;

        // Bloco de REVISÃO (Pedagógico)
        if (day > 0) {
           html += `
            <div class="sessao-tatico" style="border-left-color: hsl(var(--accent));">
              <div class="check-btn" onclick="this.parentElement.classList.toggle('concluida')"></div>
              <span class="badge-instrucao" style="background: hsl(var(--accent)/.2); color: hsl(var(--accent));">Manutenção de Memória</span>
              <strong class="materia-titulo">Revisão Ativa (24h)</strong>
              <span class="topico-sub">Recuperar tópicos da ${diasNomes[day-1]} e flashcards.</span>
            </div>`;
           hRestantes -= 1;
        }

        // Blocos de CONTEÚDO NOVO (Puxando seus subtópicos)
        while (hRestantes > 0) {
          let bloco = hRestantes >= 2 ? 2 : 1;
          let mId = fila[fIdx];
          fIdx = (fIdx + 1) % fila.length;
          
          let mentor = mentores[mId];
          let dados = mentor.getNext();

          html += `
            <div class="sessao-tatico">
              <div class="check-btn" onclick="this.parentElement.classList.toggle('concluida')"></div>
              <span class="badge-instrucao">Teoria + Questões (${bloco}h)</span>
              <strong class="materia-titulo">${mentor.disciplina.nome}</strong>
              <span class="topico-sub"><strong>${dados.grupo}:</strong> ${dados.sub}</span>
            </div>`;
          hRestantes -= bloco;
        }
        html += `</div>`;
      }
    }

    document.getElementById('cronograma-result').innerHTML = html;
    wizardGoStep(5);
  }

  // TODAS AS SUAS OUTRAS FUNÇÕES ORIGINAIS CONTINUAM AQUI...
</script>
</body>
</html>
